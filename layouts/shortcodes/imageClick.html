<!-- get value from params -->
{{/*

使用示例, 在 md 文件里面写：
{{< imageClick src="images/news/notice3.png" style=""  >}}

*/}}


{{ $class:= .Get "class" }}
{{ $src:= .Get "src" }}
{{ $style:= .Get "style" }}


<div class="short-code-image {{$class}} " >
  <a      href="{{ $src | relURL }}"
          style="display: block;"
          class="glightbox">
    <img  src="{{ relURL $src }}"  style="{{ $style | safeCSS }}" />
  </a>
</div>
<script type="text/javascript">

  document.addEventListener('DOMContentLoaded', function() {
    // DOM 已加载，可以安全操作
    // console.log('DOM 已完全加载');
    const options = {};
    const lightbox = GLightbox({ ...options });
  });
</script>
